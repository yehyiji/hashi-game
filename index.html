    // 工具函數：產生空橋樑狀態 (加入 owner 屬性記錄橋是誰畫的)
    const generateEmptyBridges = (level) => {
      let pb = [];
      let bridgeId = 1;
      const islands = level.islands;
      for (let i = 0; i < islands.length; i++) {
        let a = islands[i];
        let rightNeighbor = null;
        for (let j = 0; j < islands.length; j++) {
          let b = islands[j];
          if (b.y === a.y && b.x > a.x) {
            if (!rightNeighbor || b.x < rightNeighbor.x) rightNeighbor = b;
          }
        }
        if (rightNeighbor) pb.push({ id: bridgeId++, from: a.id, to: rightNeighbor.id, type: 'h', count: 0, owner: null });

        let bottomNeighbor = null;
        for (let j = 0; j < islands.length; j++) {
          let b = islands[j];
          if (b.x === a.x && b.y > a.y) {
            if (!bottomNeighbor || b.y < bottomNeighbor.y) bottomNeighbor = b;
          }
        }
        if (bottomNeighbor) pb.push({ id: bridgeId++, from: a.id, to: bottomNeighbor.id, type: 'v', count: 0, owner: null });
      }
      return pb;
    };

    function HashiGame() {

      const [currentLevelId, setCurrentLevelId] = useState(1);

      const [isHeaderCollapsed, setIsHeaderCollapsed] = useState(false);
      const [zoomLevel, setZoomLevel] = useState(1);

      const [isMultiplayer, setIsMultiplayer] = useState(false);
      const [roomId, setRoomId] = useState("");
      const [isHost, setIsHost] = useState(false);
      const [myPeerId, setMyPeerId] = useState(null); // 紀錄自己的連線 ID

      const [showJoinModal, setShowJoinModal] = useState(false);
      const [tempRoomId, setTempRoomId] = useState("");
      const [tempPlayerName, setTempPlayerName] = useState("");
      const [playersList, setPlayersList] = useState([]); // [{id, name, isHost, color}]

      // Refs：用來在 PeerJS 的非同步回呼中取得「最新」的狀態
      const peerRef = useRef(null);
      const clientConnRef = useRef(null);
      const hostConnsRef = useRef({}); 
      const playersRef = useRef([]); 
      const stateRef = useRef({ bridges: [], levelId: 1, isMultiplayer: false, isHost: false, myPeerId: null });

      const currentLevel = useMemo(() => LEVELS.find(l => l.id === currentLevelId), [currentLevelId]);

      // 隨時同步最新狀態到 Ref，讓網路事件能存取到最新變數
      useEffect(() => {
        stateRef.current = { bridges, levelId: currentLevelId, isMultiplayer, isHost, myPeerId };
      }, [bridges, currentLevelId, isMultiplayer, isHost, myPeerId]);

      const potentialBridges = useMemo(() => generateEmptyBridges(currentLevel), [currentLevel]);

      // 初始化關卡
      useEffect(() => {
        setBridges(potentialBridges.map(b => ({ ...b, count: 0 })));
        setHistory([]); 
        setIsWon(false);
        setHideVictoryModal(false);
        setMessage("");
        setZoomLevel(1);
      }, [potentialBridges, currentLevelId]);

      // ===== 廣播狀態給所有連線者 =====
      const broadcastToAll = (type, data, excludePeerId = null) => {
        Object.values(hostConnsRef.current).forEach(conn => {
          if (conn.peer !== excludePeerId) {
            conn.send({ type, data });
          }
        });
      };

      // ===== 斷開連線 =====
      const disconnectMultiplayer = () => {
        if (peerRef.current) peerRef.current.destroy();
        setIsMultiplayer(false);
        setRoomId("");
        setIsHost(false);
        setMyPeerId(null);
        setPlayersList([]);
        playersRef.current = [];
        hostConnsRef.current = {};
        clientConnRef.current = null;
      };

      // ===== 啟動多人連線引擎 =====
      const startMultiplayer = (roomCode, playerName) => {
        if (!roomCode || !playerName) {
          alert("請完整輸入房號與您的暱稱！");
          return;
        }

        const fullRoomId = 'hashi-game-comic-' + roomCode; 
        const peer = new Peer(fullRoomId);

        // 1. 如果成功佔用 ID，成為「主機 👑」
        peer.on('open', (id) => {
          setIsHost(true);
          setIsMultiplayer(true);
          setRoomId(roomCode);
          setMyPeerId(id);
          
          const initialPlayers = [{ id, name: playerName, isHost: true, color: '#3b82f6' }];
          setPlayersList(initialPlayers);
          playersRef.current = initialPlayers;
          
          peer.on('connection', (conn) => {
            hostConnsRef.current[conn.peer] = conn;

            conn.on('data', (msg) => {
               if (msg.type === 'JOIN') {
                 const newColor = COLORS[playersRef.current.length % COLORS.length];
                 const newPlayer = { id: conn.peer, name: msg.data.name, isHost: false, color: newColor };
                 playersRef.current = [...playersRef.current, newPlayer];
                 setPlayersList([...playersRef.current]);
                 
                 broadcastToAll('SYNC_PLAYERS', playersRef.current);
                 conn.send({ type: 'SYNC_FULL_STATE', data: stateRef.current });
               } 
               else if (msg.type === 'UPDATE_BRIDGE') {
                 // 接收到某位玩家的「單一橋樑更新」 -> 只更新那一根橋，避免互相覆蓋
                 setBridges(prev => prev.map(b => b.id === msg.data.bridgeId ? { ...b, count: msg.data.count, owner: msg.data.owner } : b));
                 // 轉發給其他玩家
                 broadcastToAll('UPDATE_BRIDGE', msg.data, conn.peer);
               }
            });

            conn.on('close', () => {
               delete hostConnsRef.current[conn.peer];
               playersRef.current = playersRef.current.filter(p => p.id !== conn.peer);
               setPlayersList([...playersRef.current]);
               broadcastToAll('SYNC_PLAYERS', playersRef.current);
            });
          });
        });

        // 2. 若 ID 已經被佔用，代表房間已存在，成為「玩家 👤」加入
        peer.on('error', (err) => {
          if (err.type === 'unavailable-id') {
             peer.destroy(); 
             const clientPeer = new Peer();
             
             clientPeer.on('open', (id) => {
               setMyPeerId(id);
               const conn = clientPeer.connect(fullRoomId);
               clientConnRef.current = conn;
               
               conn.on('open', () => {
                 setIsHost(false);
                 setIsMultiplayer(true);
                 setRoomId(roomCode);
                 conn.send({ type: 'JOIN', data: { name: playerName } });
               });

               conn.on('data', (msg) => {
                 if (msg.type === 'SYNC_PLAYERS') {
                   setPlayersList(msg.data);
                 } else if (msg.type === 'SYNC_FULL_STATE') {
                   // 房主更換關卡或初始化時，全面覆蓋狀態
                   if (msg.data.bridges) setBridges(msg.data.bridges);
                   if (msg.data.levelId && msg.data.levelId !== stateRef.current.levelId) {
                      setCurrentLevelId(msg.data.levelId);
                   }
                 } else if (msg.type === 'UPDATE_BRIDGE') {
                   // 收到他人畫的橋樑，局部更新
                   setBridges(prev => prev.map(b => b.id === msg.data.bridgeId ? { ...b, count: msg.data.count, owner: msg.data.owner } : b));
                 }
               });

               conn.on('close', () => {
                 alert("與主機斷開連線！即將退回單機模式。");
                 disconnectMultiplayer();
               });
             });
             peerRef.current = clientPeer;
          } else {
             alert("連線發生錯誤：" + err.message);
          }
        });

        peerRef.current = peer;
      };

      // 計算目前各島橋樑數
      const islandCurrentCounts = useMemo(() => {
        const counts = {};
        currentLevel.islands.forEach(i => counts[i.id] = 0);
        bridges.forEach(b => {
          if (counts[b.from] !== undefined) counts[b.from] += b.count;
          if (counts[b.to] !== undefined) counts[b.to] += b.count;
        });
        return counts;
      }, [bridges, currentLevel]);

      // 檢查是否過關
      useEffect(() => {
        let allCountsMatch = true;
        for (let island of currentLevel.islands) {
          if (islandCurrentCounts[island.id] !== island.req) {
            allCountsMatch = false;
            break;
          }
        }

        if (!allCountsMatch) {
          if (isWon) setIsWon(false);
          return;
        }

        const adjList = {};
        currentLevel.islands.forEach(i => adjList[i.id] = []);
        bridges.forEach(b => {
          if (b.count > 0 && adjList[b.from] && adjList[b.to]) {
            adjList[b.from].push(b.to);
            adjList[b.to].push(b.from);
          }
        });

        const visited = new Set();
        const queue = [currentLevel.islands[0].id];
        if (queue.length > 0) visited.add(queue[0]);

        while (queue.length > 0) {
          const curr = queue.shift();
          for (let neighbor of adjList[curr]) {
            if (!visited.has(neighbor)) {
              visited.add(neighbor);
              queue.push(neighbor);
            }
          }
        }

        if (visited.size === currentLevel.islands.length) {
          if (!isWon) {
            setIsWon(true);
            setHideVictoryModal(false); 
          }
        } else {
          setIsWon(false);
        }
      }, [bridges, currentLevel, islandCurrentCounts, isWon]);

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(""), 3000);
      };

      // 防交叉判定邏輯
      const isCrossing = (targetBridge, currentBridges) => {
        const islandsMap = {};
        currentLevel.islands.forEach(i => islandsMap[i.id] = i);
        const tFrom = islandsMap[targetBridge.from];
        const tTo = islandsMap[targetBridge.to];
        if (!tFrom || !tTo) return false;

        if (targetBridge.type === 'h') {
          const y = tFrom.y;
          const minX = Math.min(tFrom.x, tTo.x);
          const maxX = Math.max(tFrom.x, tTo.x);
          for (let b of currentBridges) {
            if (b.count > 0 && b.type === 'v') {
              const bFrom = islandsMap[b.from];
              const bTo = islandsMap[b.to];
              if (!bFrom || !bTo) continue;
              const x = bFrom.x;
              const minY = Math.min(bFrom.y, bTo.y);
              const maxY = Math.max(bFrom.y, bTo.y);
              if (x > minX && x < maxX && y > minY && y < maxY) return true;
            }
          }
        } else {
          const x = tFrom.x;
          const minY = Math.min(tFrom.y, tTo.y);
          const maxY = Math.max(tFrom.y, tTo.y);
          for (let b of currentBridges) {
            if (b.count > 0 && b.type === 'h') {
              const bFrom = islandsMap[b.from];
              const bTo = islandsMap[b.to];
              if (!bFrom || !bTo) continue;
              const y = bFrom.y;
              const minX = Math.min(bFrom.x, bTo.x);
              const maxX = Math.max(bFrom.x, bTo.x);
              if (y > minY && y < maxY && x > minX && x < maxX) return true;
            }
          }
        }
        return false;
      };

      // ===== 橋樑點擊與同步邏輯 (支援多人同時點擊) =====
      const handleBridgeClick = (bridgeId) => {
        if (isWon) return; 

        let shouldBroadcast = false;
        let syncData = null;

        setBridges(prev => {
          const target = prev.find(b => b.id === bridgeId);
          if (!target) return prev;
          
          if (target.count === 0 && isCrossing(target, prev)) {
            showMessage("🚫 橋樑不能交叉喔！請先移除阻擋的橋。");
            if (!stateRef.current.isMultiplayer) setHistory(past => past.slice(0, -1));
            return prev;
          }
          
          if (!stateRef.current.isMultiplayer) setHistory(past => [...past, prev]);

          const newCount = (target.count + 1) % 3;
          // 若有連線則記錄這條橋是我畫的
          const newOwner = newCount > 0 ? stateRef.current.myPeerId : null;
          
          shouldBroadcast = true;
          syncData = { bridgeId, count: newCount, owner: newOwner };

          return prev.map(b => b.id === bridgeId ? { ...b, count: newCount, owner: newOwner } : b);
        });

        // 廣播此條橋的變動，不影響其他正在點擊橋樑的玩家
        setTimeout(() => {
          if (shouldBroadcast && stateRef.current.isMultiplayer) {
            if (stateRef.current.isHost) {
              broadcastToAll('UPDATE_BRIDGE', syncData);
            } else if (clientConnRef.current) {
              clientConnRef.current.send({ type: 'UPDATE_BRIDGE', data: syncData });
            }
          }
        }, 0);
      };

      const handleUndo = () => {
        if (history.length === 0 || isWon || isMultiplayer) return;
        const previousState = history[history.length - 1];
        setBridges(previousState);
        setHistory(past => past.slice(0, -1));
      };

      const handleReset = () => {
        const empty = generateEmptyBridges(currentLevel);
        setBridges(empty);
        if (isMultiplayer) {
          const syncData = { bridges: empty, levelId: currentLevelId };
          if (isHost) broadcastToAll('SYNC_FULL_STATE', syncData);
          else if (clientConnRef.current) clientConnRef.current.send({ type: 'ACTION', data: syncData });
        } else {
          setHistory([]);
        }
      };

      const handleLevelChange = (newLevelId) => {
        // 多人模式下，只有主機可以換關卡
        if (isMultiplayer && !isHost) return;

        setCurrentLevelId(newLevelId);
        const empty = generateEmptyBridges(LEVELS.find(l => l.id === newLevelId));
        if (isMultiplayer && isHost) {
          const syncData = { bridges: empty, levelId: newLevelId };
          broadcastToAll('SYNC_FULL_STATE', syncData);
        }
      };

      const handleZoomIn = () => setZoomLevel(prev => Math.min(prev + 0.2, 3));
      const handleZoomOut = () => setZoomLevel(prev => Math.max(prev - 0.2, 0.4));
      const handleZoomReset = () => setZoomLevel(1);

      const maxGridX = Math.max(...currentLevel.islands.map(i => i.x), 6); 
      const maxGridY = Math.max(...currentLevel.islands.map(i => i.y), 6);
      
      const SCALE = 65;
      const PADDING = 85;
      const ISLAND_RADIUS = 20;

      const svgWidthBase = maxGridX * SCALE + PADDING * 2;
      const svgHeightBase = maxGridY * SCALE + PADDING * 2;

      // === 繪製橋樑 ===
      const renderBridge = (bridge) => {
        const islandsMap = {};
        currentLevel.islands.forEach(i => islandsMap[i.id] = i);
        const from = islandsMap[bridge.from];
        const to = islandsMap[bridge.to];

        if (!from || !to) return null;

        const x1 = from.x * SCALE + PADDING;
        const y1 = from.y * SCALE + PADDING;
        const x2 = to.x * SCALE + PADDING;
        const y2 = to.y * SCALE + PADDING;

        // ===== 決定橋樑的顏色與透明度 =====
        let lineStroke = "#1e293b"; // 預設(自己畫的): 粗黑色
        let lineOpacity = 1;

        if (stateRef.current.isMultiplayer && bridge.count > 0 && bridge.owner && bridge.owner !== stateRef.current.myPeerId) {
            // 如果是別人畫的，找出對方的專屬顏色，並給予半透明效果
            const ownerObj = playersList.find(p => p.id === bridge.owner);
            lineStroke = ownerObj ? ownerObj.color : "#94a3b8"; 
            lineOpacity = 0.5; // 顯示為半透明
        }

        return (
          <g key={bridge.id} className="group cursor-pointer" onClick={() => handleBridgeClick(bridge.id)}>
            {/* 隱形感應區 */}
            {bridge.type === 'h' ? (
              <rect x={Math.min(x1, x2) + ISLAND_RADIUS} y={y1 - 20} width={Math.abs(x1 - x2) - ISLAND_RADIUS * 2} height={40} className="fill-transparent group-hover:fill-yellow-300/30 transition-colors" />
            ) : (
              <rect x={x1 - 20} y={Math.min(y1, y2) + ISLAND_RADIUS} width={40} height={Math.abs(y1 - y2) - ISLAND_RADIUS * 2} className="fill-transparent group-hover:fill-yellow-300/30 transition-colors" />
            )}
            
            {/* 一座橋 */}
            {bridge.count === 1 && (
              <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={lineStroke} strokeWidth="6" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all duration-300" />
            )}
            
            {/* 兩座橋 */}
            {bridge.count === 2 && bridge.type === 'h' && (
              <React.Fragment>
                <line x1={x1} y1={y1 - 5} x2={x2} y2={y2 - 5} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all duration-300" />
                <line x1={x1} y1={y1 + 5} x2={x2} y2={y2 + 5} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all duration-300" />
              </React.Fragment>
            )}
            {bridge.count === 2 && bridge.type === 'v' && (
              <React.Fragment>
                <line x1={x1 - 5} y1={y1} x2={x2 - 5} y2={y2} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all duration-300" />
                <line x1={x1 + 5} y1={y1} x2={x2 + 5} y2={y2} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all duration-300" />
              </React.Fragment>
            )}
          </g>
        );
      };

      const renderIsland = (island) => {
        const cx = island.x * SCALE + PADDING;
        const cy = island.y * SCALE + PADDING;
        const current = islandCurrentCounts[island.id];
        
        let strokeColor = "#1e293b";
        let bgColor = "#ffffff";
        let textColor = "#1e293b";

        if (current === island.req) {
          strokeColor = "#059669"; 
          bgColor = "#d1fae5";
          textColor = "#065f46";
        } else if (current > island.req) {
          strokeColor = "#dc2626"; 
          bgColor = "#fee2e2";
          textColor = "#991b1b";
        }

        return (
          <g key={`island-${island.id}`}>
            <circle cx={cx + 3} cy={cy + 3} r={ISLAND_RADIUS} fill="rgba(30,41,59,0.2)" />
            <circle cx={cx} cy={cy} r={ISLAND_RADIUS} fill={bgColor} stroke={strokeColor} strokeWidth="4" className="transition-colors duration-300" />
            <text x={cx} y={cy + 2} textAnchor="middle" dominantBaseline="central" className="text-xl font-black font-sans pointer-events-none transition-colors duration-300" fill={textColor}>
              {island.req}
            </text>
          </g>
        );
      };

      return (
        <div className="min-h-screen p-2 md:p-4 flex flex-col items-center font-sans relative" style={{ backgroundColor: '#fdf5e6', backgroundImage: 'radial-gradient(#d3c5ab 2px, transparent 2px)', backgroundSize: '12px 12px' }}>
          
          <div className="w-full max-w-[1200px] bg-[#fffaf0] rounded-xl border-4 border-slate-800 shadow-[8px_8px_0px_rgba(30,41,59,1)] overflow-hidden flex flex-col h-[95vh] relative">
            
            {/* 標頭與控制區 */}
            <div className={`bg-[#ffcc00] border-b-4 border-slate-800 text-slate-900 shrink-0 z-20 transition-all duration-300 ease-in-out ${isHeaderCollapsed ? 'p-2 flex flex-wrap gap-2 items-center justify-between' : 'p-3 md:p-5 flex flex-col gap-3'}`}>
              
              <div className="flex justify-between items-center w-full">
                <div className="flex items-center gap-3 flex-wrap">
                  {!isHeaderCollapsed ? (
                    <h1 className="text-2xl md:text-3xl font-black tracking-tight uppercase">🌉 Hashi 數橋挑戰</h1>
                  ) : (
                    <h1 className="text-lg font-black tracking-tight uppercase px-2">🌉 數橋</h1>
                  )}
                  {/* 連線狀態徽章 */}
                  {isMultiplayer && (
                    <span className="bg-emerald-500 text-white px-2 py-1 rounded border-2 border-slate-800 font-bold text-xs md:text-sm shadow-[2px_2px_0px_rgba(30,41,59,1)] animate-pulse flex items-center gap-1">
                      {isHost ? '👑 主機' : '👤 玩家'} | 房號: {roomId} 
                    </span>
                  )}
                </div>

                {isHeaderCollapsed && (
                  <div className="flex items-center gap-2 flex-wrap">
                    <select 
                      disabled={isMultiplayer && !isHost}
                      value={currentLevelId} 
                      onChange={(e) => handleLevelChange(Number(e.target.value))} 
                      className={`px-2 py-1 rounded-md border-2 border-slate-800 font-bold bg-white text-slate-800 text-sm outline-none shadow-[2px_2px_0px_rgba(30,41,59,1)] ${isMultiplayer && !isHost ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'}`}
                    >
                      {LEVELS.map(level => <option key={level.id} value={level.id}>{level.name}</option>)}
                    </select>
                    {!isMultiplayer && <button onClick={handleUndo} disabled={history.length === 0 || isWon} className="px-2 py-1 bg-white border-2 border-slate-800 rounded-md font-bold text-sm shadow-[2px_2px_0px_rgba(30,41,59,1)] hover:bg-slate-100 disabled:opacity-50">↩️</button>}
                    
                    {(!isMultiplayer || isHost) ? (
                      <button onClick={handleReset} className="px-2 py-1 bg-red-500 text-white border-2 border-slate-800 rounded-md font-bold text-sm shadow-[2px_2px_0px_rgba(30,41,59,1)] hover:bg-red-600">🔄 重置</button>
                    ) : null}

                    <button onClick={() => setIsHeaderCollapsed(false)} className="ml-1 bg-slate-800 text-white px-2 py-1 rounded-md font-bold text-sm shadow-[2px_2px_0px_rgba(0,0,0,0.3)] hover:bg-slate-700">🔽 展開</button>
                  </div>
                )}
                
                {!isHeaderCollapsed && (
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={() => isMultiplayer ? disconnectMultiplayer() : setShowJoinModal(true)}
                      className={`${isMultiplayer ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-500 hover:bg-emerald-600'} text-white border-2 border-slate-800 px-3 py-1.5 rounded-md font-bold text-sm shadow-[3px_3px_0px_rgba(0,0,0,0.3)] transition-transform active:translate-y-1 active:shadow-none flex items-center gap-1`}
                    >
                      {isMultiplayer ? "🔌 斷開連線" : "🌐 多人連線"}
                    </button>
                    <button 
                      onClick={() => setIsHeaderCollapsed(true)}
                      className="bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-md font-bold text-sm shadow-[3px_3px_0px_rgba(0,0,0,0.3)] transition-transform active:translate-y-1 active:shadow-none flex items-center gap-1"
                    >
                      🔼 縮小面板
                    </button>
                  </div>
                )}
              </div>
              
              {!isHeaderCollapsed && (
                <React.Fragment>
                  <div className="bg-white border-2 border-slate-800 rounded-lg p-3 md:p-4 text-slate-800 shadow-[4px_4px_0px_rgba(30,41,59,1)] animate-fadeIn flex flex-col md:flex-row gap-4">
                    <div className="flex-1">
                      <h3 className="text-base md:text-lg font-black mb-1 md:mb-2 border-b-4 border-[#ffcc00] inline-block pb-1">📜 遊戲四大規則</h3>
                      <ol className="list-decimal list-outside ml-5 space-y-1 md:space-y-1.5 text-xs md:text-sm leading-relaxed font-bold">
                        <li>每個圓圈是一座「島」，數字代表需要<span className="text-blue-600 font-black">幾座橋樑</span>。</li>
                        <li>橋樑必須是<span className="text-blue-600 font-black">垂直或水平</span>方向。</li>
                        <li>橋樑之間<span className="text-red-500 font-black">絕對不能交叉或重疊</span>。</li>
                        <li>兩座島之間<span className="text-blue-600 font-black">最多只能架設 2 座橋</span>。</li>
                        <li>完成時，每個島都要能<span className="text-emerald-600 font-black">通往其他任何島</span>。</li>
                      </ol>
                    </div>
                    <div className="md:w-1/3 bg-[#ffcc00]/20 p-3 rounded-lg border-2 border-slate-800 flex flex-col justify-center relative">
                      <p className="text-slate-800 font-black text-sm md:text-base mb-1 flex items-center gap-1"><span>💡</span> 本關提示：</p>
                      <p className="text-slate-700 text-xs md:text-sm font-bold leading-relaxed">{currentLevel.description}</p>
                      {isMultiplayer && (
                        <div className="mt-2 text-xs text-emerald-700 font-bold bg-emerald-100 p-1 rounded border border-emerald-300">
                          多人模式中，已停用「上一步」功能以防同學畫面互搶。
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="flex flex-wrap gap-2 items-center mt-1">
                    <span className="font-bold text-slate-800 mr-1 text-sm md:text-base">關卡選擇：</span>
                    <select
                      disabled={isMultiplayer && !isHost}
                      value={currentLevelId}
                      onChange={(e) => handleLevelChange(Number(e.target.value))}
                      className={`px-3 py-1.5 rounded-md border-2 border-slate-800 font-bold bg-white text-slate-800 text-sm md:text-base outline-none shadow-[3px_3px_0px_rgba(30,41,59,1)] ${isMultiplayer && !isHost ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'}`}
                    >
                      {LEVELS.map(level => (
                        <option key={level.id} value={level.id}>{level.name}</option>
                      ))}
                    </select>
                    {isMultiplayer && !isHost && <span className="text-xs font-bold text-slate-700 bg-white/50 px-2 py-1 rounded">(僅房主可切換關卡)</span>}
                    
                    <div className="ml-auto flex gap-2">
                      {!isMultiplayer && (
                        <button 
                          onClick={handleUndo}
                          disabled={history.length === 0 || isWon}
                          className="px-3 md:px-4 py-1.5 bg-white border-2 border-slate-800 rounded-md font-bold text-sm md:text-base shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100 disabled:opacity-50 disabled:shadow-none active:translate-y-1 active:shadow-none transition-all flex items-center gap-1"
                        >
                          ↩️ 復原
                        </button>
                      )}
                      
                      {(!isMultiplayer || isHost) ? (
                        <button 
                          onClick={handleReset}
                          className="px-3 md:px-4 py-1.5 bg-red-500 text-white border-2 border-slate-800 rounded-md font-bold text-sm md:text-base shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-red-600 active:translate-y-1 active:shadow-none transition-all"
                        >
                          🔄 重置全場
                        </button>
                      ) : null}
                    </div>
                  </div>
                </React.Fragment>
              )}
            </div>

            {/* 線上玩家名單 (展開狀態且為多人連線時顯示) */}
            {isMultiplayer && !isHeaderCollapsed && (
              <div className="px-4 py-2 bg-white border-b-2 border-slate-800 flex flex-wrap gap-2 items-center z-10 shadow-sm shrink-0">
                <span className="font-black text-slate-800 text-sm">👥 線上玩家 ({playersList.length})：</span>
                {playersList.map((p, idx) => (
                  <span key={idx} className="px-2 py-0.5 rounded border-2 border-slate-800 text-xs font-bold bg-slate-100 text-slate-800 flex items-center shadow-sm" style={{ borderLeftColor: p.id === myPeerId ? '#1e293b' : p.color, borderLeftWidth: '6px' }}>
                    {p.name} {p.isHost && '👑'} {p.id === myPeerId && '(你)'}
                  </span>
                ))}
              </div>
            )}

            {/* 提示訊息區 */}
            {!isHeaderCollapsed && (
              <div className="h-8 shrink-0 flex items-center justify-center bg-slate-800 text-white border-b-4 border-slate-800 z-10 font-bold tracking-wide">
                {message && <span className="text-yellow-300 animate-pulse">{message}</span>}
                {!message && !isWon && <span className="text-xs md:text-sm hidden md:inline">支援滑鼠拖曳、滾輪縮放；右下角有縮放按鈕可供使用。</span>}
                {!message && !isWon && <span className="text-xs md:text-sm md:hidden">點擊島嶼間空白處架橋。支援雙指縮放與平移。</span>}
              </div>
            )}

            <div className="relative flex-1 flex flex-col min-h-0 bg-[#fffaf0]">
              
              <div className="absolute bottom-4 right-4 md:bottom-6 md:right-6 flex flex-col gap-2 md:gap-3 z-20 pointer-events-auto">
                <button onClick={handleZoomIn} title="放大" className="w-10 h-10 md:w-12 md:h-12 bg-white border-2 border-slate-800 rounded-full font-black text-xl md:text-2xl shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-slate-800">＋</button>
                <button onClick={handleZoomOut} title="縮小" className="w-10 h-10 md:w-12 md:h-12 bg-white border-2 border-slate-800 rounded-full font-black text-2xl md:text-3xl shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-slate-800">－</button>
                <button onClick={handleZoomReset} title="重置比例" className="w-10 h-10 md:w-12 md:h-12 bg-slate-800 border-2 border-slate-800 rounded-full font-black text-xs md:text-sm shadow-[3px_3px_0px_rgba(0,0,0,0.3)] hover:bg-slate-700 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-white">1x</button>
              </div>

              <div className="p-2 md:p-6 flex-1 overflow-auto custom-scrollbar">
                <div className="flex justify-center items-center min-w-max min-h-max m-auto pb-24 pr-20">
                  <svg 
                    viewBox={`0 0 ${svgWidthBase} ${svgHeightBase}`} 
                    className="bg-transparent transition-all duration-300 ease-out"
                    style={{ width: `${svgWidthBase * zoomLevel}px`, height: `${svgHeightBase * zoomLevel}px`, touchAction: 'manipulation' }}
                  >
                    <defs>
                      <pattern id="grid" width={SCALE} height={SCALE} patternUnits="userSpaceOnUse">
                        <path d={`M ${SCALE} 0 L 0 0 0 ${SCALE}`} fill="none" stroke="#e2e8f0" strokeWidth="1"/>
                      </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)" transform={`translate(${PADDING}, ${PADDING})`} className="opacity-50 pointer-events-none" />
                    
                    {bridges.map(renderBridge)}
                    {currentLevel.islands.map(renderIsland)}
                  </svg>
                </div>
              </div>
            </div>

            {/* 過關選單 */}
            {isWon && !hideVictoryModal && (
              <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-white rounded-2xl p-5 md:p-6 border-4 border-slate-800 shadow-[8px_8px_0px_rgba(30,41,59,1)] z-30 text-center min-w-[280px] md:min-w-[320px] animate-[bounce_1s_ease-in-out_1]">
                <button onClick={() => setHideVictoryModal(true)} className="absolute top-2 right-3 text-slate-400 hover:text-slate-800 text-2xl font-black">✕</button>
                <div className="text-4xl md:text-5xl mb-2">💥🏆</div>
                <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-2 uppercase tracking-wide">PERFECT!</h2>
                <p className="text-slate-600 mb-5 text-sm md:text-base font-bold border-b-2 border-dashed border-slate-300 pb-4">所有的島嶼都成功連結了！</p>
                <div className="flex justify-center gap-3">
                  {currentLevelId < LEVELS.length ? (
                    <button onClick={() => handleLevelChange(currentLevelId + 1)} className="px-4 md:px-5 py-2 bg-[#ffcc00] hover:bg-[#e6b800] text-slate-900 border-2 border-slate-800 font-black rounded-xl shadow-[4px_4px_0px_rgba(30,41,59,1)] active:translate-y-1 active:shadow-none transition-all">NEXT LEVEL ➔</button>
                  ) : (
                    <button onClick={handleReset} className="px-4 md:px-5 py-2 bg-blue-500 hover:bg-blue-600 text-white border-2 border-slate-800 font-black rounded-xl shadow-[4px_4px_0px_rgba(30,41,59,1)] active:translate-y-1 active:shadow-none transition-all">PLAY AGAIN</button>
                  )}
                </div>
              </div>
            )}

            {isWon && hideVictoryModal && (
              <button onClick={() => setHideVictoryModal(false)} className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-[#ffcc00] text-slate-900 border-4 border-slate-800 px-5 py-2 rounded-full shadow-[6px_6px_0px_rgba(30,41,59,1)] z-30 hover:bg-[#e6b800] active:translate-y-1 active:shadow-none transition-all font-black flex items-center gap-2 tracking-wide">
                🏆 SHOW VICTORY
              </button>
            )}

            {/* 加入連線房間的彈出視窗 */}
            {showJoinModal && (
              <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white border-4 border-slate-800 rounded-2xl p-6 shadow-[10px_10px_0px_rgba(0,0,0,1)] w-full max-w-sm animate-fadeIn">
                  <h2 className="text-2xl font-black text-slate-800 mb-2 border-b-4 border-[#ffcc00] inline-block pb-1">🌐 多人連線</h2>
                  <p className="text-sm font-bold text-slate-600 mb-4">第一個輸入房號的人將成為「主機👑」，其他人輸入相同房號即可加入房間。</p>
                  
                  <div className="flex flex-col gap-3 mb-5">
                    <div>
                      <label className="block text-slate-800 font-bold text-sm mb-1">您的暱稱：</label>
                      <input 
                        type="text" 
                        placeholder="例如：王小明" 
                        value={tempPlayerName}
                        onChange={(e) => setTempPlayerName(e.target.value)}
                        className="w-full border-2 border-slate-800 rounded-lg p-2 font-bold text-base shadow-[3px_3px_0px_rgba(30,41,59,1)] outline-none focus:bg-yellow-50"
                      />
                    </div>
                    <div>
                      <label className="block text-slate-800 font-bold text-sm mb-1">欲建立/加入的房號：</label>
                      <input 
                        type="text" 
                        placeholder="例如：8888" 
                        value={tempRoomId}
                        onChange={(e) => setTempRoomId(e.target.value)}
                        className="w-full border-2 border-slate-800 rounded-lg p-2 font-bold text-base shadow-[3px_3px_0px_rgba(30,41,59,1)] outline-none focus:bg-yellow-50"
                      />
                    </div>
                  </div>

                  <div className="flex gap-3">
                    <button 
                      onClick={() => setShowJoinModal(false)}
                      className="flex-1 py-2 bg-white border-2 border-slate-800 rounded-lg font-bold shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100"
                    >
                      取消
                    </button>
                    <button 
                      onClick={() => {
                        startMultiplayer(tempRoomId.trim(), tempPlayerName.trim());
                        setShowJoinModal(false);
                      }}
                      className="flex-1 py-2 bg-emerald-500 text-white border-2 border-slate-800 rounded-lg font-bold shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-emerald-600"
                    >
                      進入房間
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HashiGame />);
  </script>
</body>
</html>
